# Nginx : sert la SPA statique + reverse-proxy de l'API vers le service `backend`.
# Tout est servi depuis une seule origine → pas de CORS, pas d'URL d'API à
# configurer côté client (cf. location /config.js).

upstream calculator_api {
    server backend:8001;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compression des réponses textuelles (catalogue volumineux).
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;

    # Configuration runtime injectée : l'API est sur la même origine que le front.
    # Shadow le fichier statique config.js (neutre, utilisé seulement en dev).
    location = /config.js {
        default_type application/javascript;
        expires -1;
        return 200 "window.CALCULATOR_API_BASE = window.location.origin;\n";
    }

    # API : relais vers le backend FastAPI (chemin /api/* préservé).
    location /api/ {
        proxy_pass http://calculator_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        # Exports (xlsx/pdf/html) en flux : pas de mise en tampon.
        proxy_buffering off;
    }

    # Sonde de santé exposée par le backend.
    location = /health {
        proxy_pass http://calculator_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA : tout le reste retombe sur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
